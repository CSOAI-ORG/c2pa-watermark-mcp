version: "3.8"

services:
  c2pa-watermark-mcp:
    build: .
    container_name: c2pa-watermark-mcp
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
